version: '3.8'

services:
  web:
    build: .
    container_name: fabouanes_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/fabouanes.db
      - SECRET_KEY=${SECRET_KEY}
      - FASTAPI_ENV=${FASTAPI_ENV:-production}
      - FAB_HOST=0.0.0.0
      - FAB_PORT=5000
      - WEB_CONCURRENCY=1
    volumes:
      - fabdata:/app/data

volumes:
  fabdata:

