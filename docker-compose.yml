version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fabouanes_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fabouanes
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fabouanes_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabouanes -d fabouanes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: fabouanes_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata_dev:
