version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fabouanes_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fabouanes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-fabouanes_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fabouanes} -d $${POSTGRES_DB:-fabouanes_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fabouanes_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fabouanes:password123@db:5432/fabouanes_dev}
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key-change-me-in-production-env}
      - FASTAPI_ENV=${FASTAPI_ENV:-production}
      - FAB_HOST=0.0.0.0
      - FAB_PORT=5000
      - WEB_CONCURRENCY=1
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: fabouanes_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata_dev:
