{% extends 'base.html' %}
{% block content %}
<style>
  .login-page {
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: transparent;
  }
  .login-card {
    width: min(100%, 420px);
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] .login-card, [data-theme="windows-dark"] .login-card {
    background: rgba(28, 28, 30, 0.55);
    border-color: rgba(255, 255, 255, 0.08);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-brand {
    display: grid;
    justify-items: center;
    gap: 14px;
    margin-bottom: 30px;
    text-align: center;
  }
  .login-logo-frame {
    width: min(100%, 200px);
    aspect-ratio: 1408/768;
    display: grid;
    place-items: center;
    padding: 8px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
  }
  [data-theme="dark"] .login-logo-frame, [data-theme="windows-dark"] .login-logo-frame {
    background: rgba(255, 255, 255, 0.85);
    border-color: rgba(255, 255, 255, 0.9);
  }
  .login-logo-frame:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0, 122, 255, 0.15);
  }
  .login-logo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .login-title {
    margin: 0;
    font-size: 1.45rem;
    line-height: 1.2;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    font-family: var(--font-title-val);
  }
  .login-subtitle {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: .9rem;
    font-weight: 500;
  }
  .login-alert {
    margin-bottom: 20px;
    border-radius: 12px;
    font-size: .88rem;
    font-weight: 500;
    border: none;
  }
  .login-field {
    margin-bottom: 20px;
  }
  .login-label {
    display: block;
    margin-bottom: 6px;
    color: var(--text);
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .login-input-wrap {
    position: relative;
  }
  .login-input-wrap > i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
    transition: color 0.2s ease;
  }
  .login-input {
    width: 100%;
    height: 48px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.45);
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0 44px;
    transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] .login-input, [data-theme="windows-dark"] .login-input {
    background: rgba(28, 28, 30, 0.45);
    border-color: rgba(255, 255, 255, 0.06);
  }
  .login-input:focus {
    outline: none;
    border-color: #007aff;
    background: rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
  }
  [data-theme="dark"] .login-input:focus, [data-theme="windows-dark"] .login-input:focus {
    border-color: #0a84ff;
    background: rgba(28, 28, 30, 0.8);
    box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.25);
  }
  .login-input:focus ~ i, .login-input:focus-within ~ i {
    color: #007aff;
  }
  [data-theme="dark"] .login-input:focus ~ i, [data-theme="windows-dark"] .login-input:focus ~ i {
    color: #0a84ff;
  }
  .toggle-pass {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    display: grid;
    place-items: center;
    transition: all .2s ease;
  }
  .toggle-pass:hover {
    background: rgba(0, 122, 255, 0.1);
    color: #007aff;
  }
  [data-theme="dark"] .toggle-pass:hover, [data-theme="windows-dark"] .toggle-pass:hover {
    color: #0a84ff;
    background: rgba(10, 132, 255, 0.15);
  }
  .login-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0 24px;
  }
  .remember-check {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: .88rem;
    font-weight: 500;
    cursor: pointer;
  }
  .remember-check input {
    width: 16px;
    height: 16px;
    accent-color: #007aff;
    cursor: pointer;
  }
  .btn-login {
    width: 100%;
    height: 48px;
    border: 0;
    border-radius: 10px;
    background: linear-gradient(180deg, #007aff 0%, #0066cc 100%);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 8px 24px rgba(0, 122, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn-login:hover {
    background: linear-gradient(180deg, #1485ff 0%, #0070e0 100%);
    transform: translateY(-1px);
    box-shadow: 0 12px 28px rgba(0, 122, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }
  .btn-login:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
  }
  .btn-login > i {
    font-size: 1.1rem;
    transition: transform 0.3s ease;
  }
  .btn-login:hover > i {
    transform: translateX(3px);
  }
  @media(max-width:575px) {
    .login-page { padding: 16px }
    .login-card { padding: 32px 24px }
    .login-logo-frame { width: min(100%, 170px) }
  }
</style>

<div class="login-page">
  <main class="login-card" aria-label="Connexion">
    <div class="login-brand">
      <div class="login-logo-frame">
        <img src="{{ url_for('static', filename='dashboard.webp') }}" alt="FABOuanes" class="login-logo" loading="eager" decoding="async">
      </div>
      <div>
        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Acces a FABOuanes</p>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} login-alert">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" action="{{ url_for('login') }}" autocomplete="on">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="login-field">
        <label class="login-label" for="usernameInput">Utilisateur</label>
        <div class="login-input-wrap">
          <i class="bi bi-person"></i>
          <input id="usernameInput" name="username" type="text" class="login-input" autocomplete="username" placeholder="Identifiant" required>
        </div>
      </div>

      <div class="login-field">
        <label class="login-label" for="passwordInput">Mot de passe</label>
        <div class="login-input-wrap">
          <i class="bi bi-key"></i>
          <input id="passwordInput" name="password" type="password" class="login-input" autocomplete="current-password" placeholder="********" required>
          <button type="button" class="toggle-pass" id="togglePassword" aria-label="Afficher le mot de passe">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="login-options">
        <label class="remember-check">
          <input type="checkbox" name="remember"> Se souvenir de moi
        </label>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i>
        Se connecter
      </button>
    </form>
  </main>
</div>
{% endblock %}

{% block scripts %}
<script>
if (!localStorage.getItem('fab_theme')) {
  localStorage.setItem('fab_theme', 'light');
  document.documentElement.setAttribute('data-theme', 'light');
}
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('passwordInput');
if (togglePassword && passwordInput) {
  togglePassword.addEventListener('click', function () {
    const isPassword = passwordInput.getAttribute('type') === 'password';
    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
    this.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
  });
}
</script>
{% endblock %}
