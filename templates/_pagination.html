{% if pagination %}
<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-3">
  <div class="text-muted small">
    {% if pagination.total %}
      {{ pagination.start }}-{{ pagination.end }} sur {{ pagination.total }}
    {% else %}
      0 resultat
    {% endif %}
  </div>
  <div class="btn-group" role="group" aria-label="Pagination">
    <a class="btn btn-sm btn-outline-secondary{% if not pagination.has_prev %} disabled{% endif %}" href="{{ pagination.prev_url or '#' }}">Precedent</a>
    <span class="btn btn-sm btn-outline-secondary disabled">Page {{ pagination.page }} / {{ pagination.pages }}</span>
    <a class="btn btn-sm btn-outline-secondary{% if not pagination.has_next %} disabled{% endif %}" href="{{ pagination.next_url or '#' }}">Suivant</a>
  </div>
</div>
{% endif %}
