{% extends 'base.html' %}
{% block content %}
<style>
  .expense-form-page{display:flex;flex-direction:column;gap:18px;max-width:680px;}
  .expense-form-card{padding:28px;}
  @media(max-width:767px){.expense-form-card{padding:18px;}}
</style>

<div class="expense-form-page">
  <div class="page-hero mb-0">
    <div>
      <h2 class="section-title mb-1"><i class="bi bi-wallet2 me-2"></i>{{ 'Modifier la dépense' if expense and expense.id else 'Nouvelle dépense' }}</h2>
      <p class="text-muted mb-0">{{ 'Modifiez les informations ci-dessous.' if expense and expense.id else 'Enregistrez une nouvelle dépense ou charge.' }}</p>
    </div>
  </div>

  <div class="card expense-form-card">
    <form method="post" action="{{ url_for('edit_expense', expense_id=expense.id) if expense and expense.id else url_for('new_expense') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold" for="expDate">Date <span class="text-danger">*</span></label>
          <input type="date" name="date" id="expDate" class="form-control" value="{{ expense.date if expense else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold" for="expCategory">Catégorie <span class="text-danger">*</span></label>
          <select name="category" id="expCategory" class="form-select" required>
            {% for val, label in categories %}
            <option value="{{ val }}" {{ 'selected' if expense and expense.category == val else '' }}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold" for="expDescription">Description</label>
          <input type="text" name="description" id="expDescription" class="form-control" value="{{ expense.description if expense else '' }}" placeholder="Ex: Carburant livraison, Facture électricité...">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold" for="expAmount">Montant (DA) <span class="text-danger">*</span></label>
          <input type="number" name="amount" id="expAmount" class="form-control" value="{{ expense.amount if expense else '' }}" step="0.01" min="0" required placeholder="0,00">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold" for="expMethod">Méthode de paiement</label>
          <select name="payment_method" id="expMethod" class="form-select">
            {% for val, label in payment_methods %}
            <option value="{{ val }}" {{ 'selected' if expense and expense.payment_method == val else '' }}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-dark"><i class="bi bi-check-lg me-2"></i>{{ 'Enregistrer' if expense and expense.id else 'Ajouter' }}</button>
        <a href="{{ url_for('expenses') }}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
