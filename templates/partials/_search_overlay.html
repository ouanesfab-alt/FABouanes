<div class="search-overlay" id="searchOverlay" role="dialog" aria-modal="true"
     aria-label="Recherche rapide" hidden>
  <div class="search-modal">
    <div class="search-input-row">
      <i class="bi bi-search search-icon"></i>
      <input type="search" id="globalSearchInput" class="search-input"
             placeholder="Rechercher un client, produit, opération…"
             autocomplete="off" spellcheck="false">
      <kbd class="search-kbd">Esc</kbd>
    </div>
    <div class="search-tabs">
      <button class="search-tab active" data-type="all">Tout</button>
      <button class="search-tab" data-type="contacts">Contacts</button>
      <button class="search-tab" data-type="products">Produits &amp; Stocks</button>
      <button class="search-tab" data-type="operations">Opérations</button>
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-hint">Tapez au moins 2 caractères…</div>
    </div>
  </div>
</div>
