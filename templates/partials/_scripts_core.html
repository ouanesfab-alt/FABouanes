<script nonce="{{ csp_nonce }}">
  document.addEventListener('DOMContentLoaded', () => {
    const toasts = document.querySelectorAll('.toast');
    toasts.forEach(t => new bootstrap.Toast(t).show());

    // Apply theme-adaptive styling to flash toasts
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.querySelectorAll('.flash-toast').forEach(t => {
      t.style.borderRadius = '10px';
      t.style.backgroundColor = isDark ? '#1e2a30' : '#f0f2f5';
      t.style.color = isDark ? '#e9edef' : '#111b21';
      t.style.borderLeft = '4px solid ' + (t.dataset.accent || '#25D366');
      if (!isDark) t.style.boxShadow = '0 4px 20px rgba(0,0,0,0.15)';
      const closeBtn = t.querySelector('.flash-toast-close');
      if (closeBtn && isDark) closeBtn.classList.add('btn-close-white');
    });

    // Autofocus first valid input
    const firstInput = document.querySelector('form:not([data-no-autofocus]) input:not([type=hidden]):not([readonly])');
    if (firstInput && !firstInput.closest('.modal')) {
      setTimeout(() => firstInput.focus(), 100);
    }

    // Auto-resize textareas to fit content dynamically
    const autoResizeTextarea = (el) => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    };
    document.querySelectorAll('textarea').forEach(tx => {
      tx.style.overflowY = 'hidden';
      setTimeout(() => autoResizeTextarea(tx), 50);
      tx.addEventListener('input', () => autoResizeTextarea(tx));
      tx.addEventListener('focus', () => autoResizeTextarea(tx));
    });

    // Floating labels select fix
    document.querySelectorAll('.form-float select').forEach(sel => {
      const checkVal = () => { if(sel.value) sel.classList.add('has-value'); else sel.classList.remove('has-value'); };
      sel.addEventListener('change', checkVal);
      checkVal();
    });

    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.key.toLowerCase() === 's') {
        e.preventDefault();
        const submitBtn = document.querySelector('form button[type="submit"]:not(.is-loading)');
        if (submitBtn) submitBtn.click();
      }
      if (e.ctrlKey && e.key.toLowerCase() === 'f') {
        const searchInput = document.querySelector('input[type="search"], input[name="q"]');
        if (searchInput) {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        }
      }
    });

    // Validation live des champs obligatoires et montants
    document.querySelectorAll('input[required], select[required]').forEach(field => {
      field.addEventListener('blur', function () {
        if (!this.value.trim()) {
          this.classList.add('is-invalid');
          this.classList.remove('is-valid');
        } else {
          this.classList.remove('is-invalid');
          this.classList.add('is-valid');
        }
      });
      field.addEventListener('input', function () {
        if (this.value.trim()) {
          this.classList.remove('is-invalid');
        }
      });
    });

    // Validation montants positifs
    document.querySelectorAll('input[type="number"]').forEach(field => {
      field.addEventListener('blur', function () {
        const val = parseFloat(this.value);
        const min = parseFloat(this.min ?? 0);
        if (this.value !== '' && (isNaN(val) || val < min)) {
          this.classList.add('is-invalid');
          if (!this.nextElementSibling?.classList.contains('invalid-feedback')) {
            const msg = document.createElement('div');
            msg.className = 'invalid-feedback';
            msg.textContent = 'Valeur invalide (doit être ≥ ' + min + ').';
            this.after(msg);
          }
        } else {
          this.classList.remove('is-invalid');
          if (this.value) this.classList.add('is-valid');
        }
      });
    });
  });



  // Dark mode toggle dans le menu user
  (function () {
    const THEME_KEY = 'fab_theme';
    const themes = ['light', 'dark'];

    function applyTheme(t) {
      if (t === 'auto' || !themes.includes(t)) {
        t = 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem(THEME_KEY, t);

      // Met à jour le bouton navbar
      const btn = document.getElementById('themeToggleBtnNavbar');
      if (btn) {
        const icon = btn.querySelector('.bi');
        if (icon) {
          icon.className = 'bi ' + (t === 'light' ? 'bi-moon' : 'bi-sun');
        }
      }
    }

    let current = localStorage.getItem(THEME_KEY) || 'light';
    if (current === 'auto') {
      current = 'light';
      localStorage.setItem(THEME_KEY, 'light');
    }
    applyTheme(current);

    document.addEventListener('click', function (e) {
      const toggleBtn = e.target.closest('#themeToggleBtnNavbar');
      
      if (toggleBtn) {
        e.preventDefault();
        current = current === 'light' ? 'dark' : 'light';
        applyTheme(current);
      }
    });
  })();

  // Recherche rapide
  (function () {
    const overlay = document.getElementById('searchOverlay');
    const input   = document.getElementById('globalSearchInput');
    const results = document.getElementById('searchResults');
    if (!overlay) return;

    let selectedIndex = -1;
    const pageLoadTime = Date.now();
    let currentSearchResults = [];
    let selectedCategory = 'all';

    function getItems() {
      return Array.from(results.querySelectorAll('.search-result-item'));
    }

    function updateSelection() {
      const items = getItems();
      items.forEach((item, idx) => {
        if (idx === selectedIndex) {
          item.classList.add('is-selected');
          item.scrollIntoView({ block: 'nearest' });
        } else {
          item.classList.remove('is-selected');
        }
      });
    }

    function openSearch() {
      if (Date.now() - pageLoadTime < 500) return;
      overlay.hidden = false;
      input.value = '';
      selectedIndex = -1;
      currentSearchResults = [];
      selectedCategory = 'all';
      updateTabsUI();
      results.innerHTML = '<div class="search-hint">Tapez au moins 2 caractères…</div>';
      setTimeout(() => input.focus(), 50);
    }
    window.openSearch = openSearch;

    function closeSearch() {
      overlay.hidden = true;
    }

    // Ouvrir
    document.getElementById('globalSearchBtn')?.addEventListener('click', openSearch);
    
    // Keyboard listeners
    document.addEventListener('keydown', function (e) {
      const isDesktop = window.innerWidth >= 1024;
      const isSearchShortcut = isDesktop && (
        ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') || 
        (e.metaKey && e.code === 'Space')
      );
      
      if (isSearchShortcut) {
        e.preventDefault(); 
        openSearch();
      }
      if (e.key === 'Escape' && !overlay.hidden) {
        closeSearch();
      }
      if (isDesktop && e.key === '/' && overlay.hidden === true
          && document.activeElement.tagName !== 'INPUT'
          && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault(); 
        openSearch();
      }
    });

    overlay.addEventListener('click', function (e) {
      if (!e.target.closest('.search-modal')) {
        closeSearch();
      }
    });

    // Keyboard navigation inside search results
    input.addEventListener('keydown', function (e) {
      const items = getItems();

      // Tab switching with Alt + Left/Right
      if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        e.preventDefault();
        const tabs = Array.from(overlay.querySelectorAll('.search-tab'));
        const activeIdx = tabs.findIndex(t => t.classList.contains('active'));
        let nextIdx = activeIdx + (e.key === 'ArrowLeft' ? -1 : 1);
        if (nextIdx < 0) nextIdx = tabs.length - 1;
        if (nextIdx >= tabs.length) nextIdx = 0;
        tabs[nextIdx].click();
        return;
      }

      if (!items.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateSelection();
      } else if (e.key === 'Enter') {
        if (selectedIndex >= 0 && selectedIndex < items.length) {
          e.preventDefault();
          items[selectedIndex].click();
        }
      }
    });

    // Handle search input typing
    let timer;
    input.addEventListener('input', function () {
      clearTimeout(timer);
      const q = input.value.trim();
      selectedIndex = -1;
      if (q.length < 2) {
        currentSearchResults = [];
        results.innerHTML = '<div class="search-hint">Tapez au moins 2 caractères…</div>';
        return;
      }
      
      // Render beautiful Apple-like Loading Skeletons
      results.innerHTML = Array(3).fill(0).map(() => `
        <div class="search-skeleton-item">
          <div class="skeleton-shimmer" style="width: 44px; height: 44px; border-radius: 10px;"></div>
          <div style="flex: 1; min-width: 0;">
            <div class="skeleton-shimmer" style="width: 50%; height: 16px; margin-bottom: 6px;"></div>
            <div class="skeleton-shimmer" style="width: 30%; height: 12px;"></div>
          </div>
          <div class="skeleton-shimmer" style="width: 60px; height: 18px; border-radius: 6px;"></div>
        </div>
      `).join('');

      timer = setTimeout(() => doSearch(q), 250);
    });

    async function doSearch(q) {
      try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        if (!res.ok) {
          results.innerHTML = '<div class="search-hint">Erreur lors de la recherche.</div>';
          return;
        }
        const json = await res.json();
        currentSearchResults = json.data || [];
        renderResults(q);
      } catch (e) {
        results.innerHTML = '<div class="search-hint">Erreur lors de la recherche.</div>';
      }
    }

    function renderResults(q = '') {
      if (!currentSearchResults.length) {
        results.innerHTML = '<div class="search-hint">Aucun résultat pour "' +
          (q || input.value).replace(/</g, '&lt;') + '"</div>';
        return;
      }

      // Filter by category selection
      let filtered = currentSearchResults;
      if (selectedCategory === 'contacts') {
        filtered = currentSearchResults.filter(item => ['Client', 'Fournisseur'].includes(item.type));
      } else if (selectedCategory === 'products') {
        filtered = currentSearchResults.filter(item => ['Produit', 'Matière'].includes(item.type));
      } else if (selectedCategory === 'operations') {
        filtered = currentSearchResults.filter(item => ['Vente', 'Achat', 'Paiement'].includes(item.type));
      }

      if (!filtered.length) {
        results.innerHTML = '<div class="search-hint">Aucun résultat dans cette catégorie.</div>';
        return;
      }

      // Group results
      const groups = {};
      filtered.forEach(item => {
        let grpName = 'Autres';
        if (['Client', 'Fournisseur'].includes(item.type)) grpName = 'Contacts';
        else if (['Produit', 'Matière'].includes(item.type)) grpName = 'Catalogue & Stocks';
        else if (['Vente', 'Achat', 'Paiement'].includes(item.type)) grpName = 'Opérations';

        if (!groups[grpName]) groups[grpName] = [];
        groups[grpName].push(item);
      });

      // HTML Render
      let html = '';
      const order = ['Contacts', 'Catalogue & Stocks', 'Opérations', 'Autres'];
      order.forEach(grp => {
        if (groups[grp] && groups[grp].length) {
          html += `<div class="search-group-header">${grp}</div>`;
          groups[grp].forEach(item => {
            html += `
              <a class="search-result-item" href="${item.href}" onclick="document.getElementById('searchOverlay').hidden=true">
                <div class="search-result-icon"><i class="bi ${item.icon}"></i></div>
                <div style="flex: 1; min-width: 0;">
                  <div class="search-result-title">${item.title.replace(/</g,'&lt;')}</div>
                  ${item.sub ? '<div class="search-result-sub">' + item.sub.replace(/</g,'&lt;') + '</div>' : ''}
                </div>
                <span class="search-result-type">${item.type}</span>
              </a>
            `;
          });
        }
      });

      results.innerHTML = html;
      selectedIndex = -1;
      updateSelection();
    }

    function updateTabsUI() {
      overlay.querySelectorAll('.search-tab').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-type') === selectedCategory);
      });
    }

    // Bind Category Tabs Clicks
    overlay.querySelectorAll('.search-tab').forEach(btn => {
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        selectedCategory = btn.getAttribute('data-type');
        updateTabsUI();
        renderResults();
        input.focus();
      });
    });
  })();
</script>
<script nonce="{{ csp_nonce }}">
  // Évite d'avoir une date de formulaire obsolète (ex: page ouverte avant minuit, soumise après minuit)
  (function autoUpdateDateInputs() {
    let lastToday = (new Date(Date.now() - new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    setInterval(() => {
      const currentToday = (new Date(Date.now() - new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
      if (currentToday !== lastToday) {
        document.querySelectorAll('input[type="date"]').forEach(input => {
          if (input.value === lastToday) {
            input.value = currentToday;
            if (input.max === lastToday) input.max = currentToday;
          }
        });
        lastToday = currentToday;
      }
    }, 60000); // Check every minute
  })();

  // 🧭 Dynamic active-style rotation every 5 minutes (300,000ms)
  (function activeStyleRotator() {
    const STYLES = ['minimalist', 'capsule', 'border', 'subtle'];
    
    function applyRandomStyle() {
      const navLinks = document.querySelector('.nav-links');
      if (!navLinks) return;
      
      const current = navLinks.getAttribute('data-active-style') || 'minimalist';
      let next;
      do {
        next = STYLES[Math.floor(Math.random() * STYLES.length)];
      } while (next === current && STYLES.length > 1);
      
      navLinks.setAttribute('data-active-style', next);
      localStorage.setItem('fab_nav_active_style', next);
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const navLinks = document.querySelector('.nav-links');
      if (navLinks) {
        const saved = localStorage.getItem('fab_nav_active_style') || 'minimalist';
        navLinks.setAttribute('data-active-style', saved);
      }
      // Rotate style every 5 minutes (300,000ms)
      setInterval(applyRandomStyle, 300000);
    });
  })();

      'Short Stack','Neucha','Pangolin','Zeyada','Kalam','Handlee','Amita','Beth Ellen'
    ];
    const CLOCK_COLORS = [
      '#2563EB','#3B82F6','#0284C7','#0EA5E9','#06B6D4','#0D9488','#10B981','#16A34A','#84CC16','#EAB308',
      '#F59E0B','#D97706','#EA580C','#F97316','#EF4444','#DC2626','#E11D48','#F43F5E','#EC4899','#D946EF',
      '#C084FC','#A855F7','#8B5CF6','#6366F1','#4F46E5','#0D6EFD','#198754','#DC3545','#FFC107','#0DCAF0',

    ];

    const clock = document.getElementById('navClock');
    if (!clock) return;

    let currentFontIdx = -1;
    let currentColorIdx = -1;
    let loadedFonts = new Set(['Outfit']);
    const nonce = document.querySelector('script[nonce]')?.getAttribute('nonce') || '';

    // Tick every second
    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      clock.textContent = `${hh}:${mm}:${ss}`;
    }

    function rotateClockColor() {
      let idx;
      do { idx = Math.floor(Math.random() * CLOCK_COLORS.length); }
      while (idx === currentColorIdx && CLOCK_COLORS.length > 1);
      currentColorIdx = idx;
      clock.style.color = CLOCK_COLORS[idx];
    }

    function rotateClockFont() {
      let idx;
      do { idx = Math.floor(Math.random() * CLOCK_FONTS.length); }
      while (idx === currentFontIdx && CLOCK_FONTS.length > 1);
      currentFontIdx = idx;
      const fontName = CLOCK_FONTS[idx];
      const fontId = `gfont-clock-${fontName.replace(/\s+/g,'-').toLowerCase()}`;

      const applyFont = () => {
        clock.style.opacity = '0.08';
        setTimeout(() => {
          clock.style.fontFamily = `"${fontName}", system-ui, monospace`;
          clock.style.opacity = '1';
        }, 300);
      };

      if (document.getElementById(fontId) || loadedFonts.has(fontName)) {
        applyFont();
        return;
      }

      const link = document.createElement('link');
      link.id = fontId;
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName)}:wght@400;700;900&display=swap`;
      if (nonce) link.setAttribute('nonce', nonce);
      link.onload = () => { loadedFonts.add(fontName); applyFont(); };
      link.onerror = applyFont;
      document.head.appendChild(link);
    }

    // Start ticking immediately
    tick();
    setInterval(tick, 1000);

    // Same intervals as FABouanes logo (60s font / 50s color)
    rotateClockFont();
    rotateClockColor();
    setInterval(rotateClockFont, 60000);
    setInterval(rotateClockColor, 50000);
  })();
