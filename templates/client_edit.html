{% extends 'base.html' %}
{% block content %}
<div class="entity-form-page">
  <div class="page-hero mb-0">
    <div>
      <h2 class="section-title mb-1">Modifier le client</h2>
      <p class="entity-form-summary mb-0">Mettez à jour les coordonnées, le crédit initial et les notes de {{ client.name }}.</p>
    </div>
  </div>

  <div class="entity-form-shell is-narrow">
    <div class="card entity-form-card client-edit-card">
      <form method="post" class="entity-form-grid">
        <div class="span-6">
          <label for="inputName" class="form-label mb-1">Nom</label>
          <input name="name" id="inputName" value="{{ client.name }}" class="form-control" required>
        </div>
        <div class="span-6">
          <label for="inputPhone" class="form-label mb-1">Téléphone</label>
          <input name="phone" id="inputPhone" value="{{ client.phone }}" class="form-control">
        </div>
        <div class="span-12">
          <label for="inputAddress" class="form-label mb-1">Adresse</label>
          <input name="address" id="inputAddress" value="{{ client.address }}" class="form-control">
        </div>
        <div class="span-6">
          <label for="inputCredit" class="form-label mb-1">Crédit initial</label>
          <input name="opening_credit" id="inputCredit" value="{{ "%.2f"|format(client.opening_credit|float) }}" type="number" step="0.01" class="form-control">
        </div>
        <div class="span-12">
          <label for="inputNotes" class="form-label mb-1">Notes</label>
          <textarea name="notes" id="inputNotes" class="form-control" rows="3">{{ client.notes }}</textarea>
        </div>
        <div class="span-12">
          <div class="entity-form-note client-edit-note">
            La modification du crédit initial ajuste seulement la base de calcul historique du client.
          </div>
        </div>
        <div class="span-12 entity-form-actions">
          <button class="btn btn-warning">Enregistrer</button>
          <a href="{{ url_for('client_detail', client_id=client.id) }}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
