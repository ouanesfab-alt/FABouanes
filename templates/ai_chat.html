{% extends 'base.html' %}
{% block page_title %}Assistant IA{% endblock %}
{% block content %}
<style>
  .ai-page {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
    max-width: 820px;
    margin: 0 auto;
    padding: 16px 16px 0;
  }

  .ai-header {
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .ai-header h2 {
    font-size: 1rem;
    font-weight: 600;
    margin: 0 0 2px;
    color: var(--text);
  }
  .ai-header span {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .ai-messages::-webkit-scrollbar { width: 4px; }
  .ai-messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: msgIn 0.2s ease;
  }
  .msg-row.user { flex-direction: row-reverse; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.65;
    word-break: break-word;
    color: var(--text);
  }
  .msg-row.ai   .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--line);
    border-top-left-radius: 3px;
  }
  .msg-row.user .msg-bubble {
    background: var(--text);
    color: var(--bg);
    border-top-right-radius: 3px;
  }

  .msg-bubble p { margin: 0 0 6px; }
  .msg-bubble p:last-child { margin: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 18px; }
  .msg-bubble li { margin-bottom: 2px; }
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble code {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: .85em;
  }
  .msg-row.user .msg-bubble code {
    background: rgba(255,255,255,.15);
    border-color: rgba(255,255,255,.2);
  }

  .msg-time {
    font-size: 0.67rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 2px;
  }
  .msg-row.user .msg-time { text-align: right; }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    border-top-left-radius: 3px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: tdot 1.3s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  .ai-input-bar {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    padding: 12px 0 14px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }
  .ai-input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .ai-input-wrap:focus-within { border-color: var(--text); }
  #aiInput {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    resize: none;
    font-size: 0.9rem;
    line-height: 1.5;
    max-height: 120px;
    outline: none;
    font-family: inherit;
  }
  #aiInput::placeholder { color: var(--muted); }
  #aiSendBtn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--text);
    color: var(--bg);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #aiSendBtn:hover { opacity: 0.8; }
  #aiSendBtn:disabled { opacity: 0.35; cursor: default; }

  .ai-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
    text-align: center;
  }
  .ai-empty i { font-size: 2rem; opacity: 0.4; }
  .ai-empty p { font-size: 0.88rem; margin: 0; }

  @media (max-width: 600px) {
    .ai-page { height: calc(100vh - 180px); }
    .msg-bubble { max-width: 90%; }
  }
</style>

<div class="ai-page">
  <div class="ai-header">
    <h2><i class="bi bi-cpu me-2" style="opacity:.6"></i>Assistant IA</h2>
    <span>Alimenté par Gemini · vos questions, mes réponses</span>
  </div>

  <div class="ai-messages" id="aiMessages">
    <div class="ai-empty" id="aiEmpty">
      <i class="bi bi-chat-square-dots"></i>
      <p>Commencez la conversation…</p>
    </div>
  </div>

  <div class="ai-input-bar">
    <div class="ai-input-wrap">
      <textarea id="aiInput" rows="1" placeholder="Écrivez votre message…" maxlength="4000"></textarea>
    </div>
    <button id="aiSendBtn" title="Envoyer">
      <i class="bi bi-arrow-up"></i>
    </button>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
(function () {
  const messages = document.getElementById('aiMessages');
  const input    = document.getElementById('aiInput');
  const sendBtn  = document.getElementById('aiSendBtn');
  const empty    = document.getElementById('aiEmpty');
  let history    = [];
  let busy       = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function now() {
    return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMsg(role, html) {
    empty?.remove();
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    row.innerHTML = `
      <div>
        <div class="msg-bubble">${html}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'typing';
    row.innerHTML = `<div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    input.value = ''; input.style.height = 'auto';

    addMsg('user', esc(text));
    showTyping();

    try {
      const res = await fetch('/api/v1/ai/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]')?.content || '',
        },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.reply) {
        addMsg('ai', md(data.reply));
        history.push({ role: 'user', text }, { role: 'ai', text: data.reply });
        if (history.length > 40) history = history.slice(-40);
      } else {
        addMsg('ai', esc(data.error || 'Erreur. Réessayez.'));
      }
    } catch {
      document.getElementById('typing')?.remove();
      addMsg('ai', 'Impossible de contacter le serveur. Vérifiez votre connexion.');
    }

    busy = false; sendBtn.disabled = false; input.focus();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function md(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  input.focus();
})();
</script>
{% endblock %}
