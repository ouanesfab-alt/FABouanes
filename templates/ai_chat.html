{% extends 'base.html' %}
{% block page_title %}Assistant IA{% endblock %}
{% block content %}
<style>
  .ai-layout {
    display: flex;
    height: calc(100vh - 120px);
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .ai-sidebar {
    width: 260px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    background: var(--bg);
  }
  .ai-sb-header {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-sb-header button {
    flex: 1;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 7px 0;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .ai-sb-header button:hover { opacity: 0.85; }
  .ai-sb-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .ai-sb-list::-webkit-scrollbar { width: 3px; }
  .ai-sb-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .ai-conv-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text);
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .ai-conv-item:hover { background: var(--surface); }
  .ai-conv-item.active { background: var(--surface); font-weight: 600; }
  .ai-conv-item i { font-size: 0.9rem; opacity: 0.5; flex-shrink: 0; }
  .ai-conv-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ai-conv-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .ai-conv-item:hover .ai-conv-delete { opacity: 1; }
  .ai-conv-delete:hover { color: #ef4444; }
  .ai-sb-empty {
    padding: 30px 14px;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* ─── Main chat area ─── */
  .ai-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .ai-topbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .ai-topbar .ai-model-select {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    outline: none;
    font-family: inherit;
  }
  .ai-topbar-title {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .ai-sidebar-toggle {
    display: none;
    background: none;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  /* ─── Messages ─── */
  .ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .ai-messages::-webkit-scrollbar { width: 4px; }
  .ai-messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: msgIn 0.2s ease;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.65;
    word-break: break-word;
    color: var(--text);
  }
  .msg-row.ai   .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--line);
    border-top-left-radius: 3px;
  }
  .msg-row.user .msg-bubble {
    background: var(--text);
    color: var(--bg);
    border-top-right-radius: 3px;
  }
  .msg-bubble p { margin: 0 0 6px; }
  .msg-bubble p:last-child { margin: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 18px; }
  .msg-bubble li { margin-bottom: 2px; }
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble code {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: .85em;
  }
  .msg-row.user .msg-bubble code {
    background: rgba(255,255,255,.15);
    border-color: rgba(255,255,255,.2);
  }
  .msg-time {
    font-size: 0.67rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 2px;
  }
  .msg-row.user .msg-time { text-align: right; }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    border-top-left-radius: 3px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: tdot 1.3s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  .ai-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 6px;
    text-align: center;
  }
  .ai-empty i { font-size: 1.8rem; opacity: 0.35; }
  .ai-empty p { font-size: 0.85rem; margin: 0; }

  /* ─── Input ─── */
  .ai-input-bar {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }
  .ai-input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .ai-input-wrap:focus-within { border-color: var(--text); }
  #aiInput {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    resize: none;
    font-size: 0.9rem;
    line-height: 1.5;
    max-height: 120px;
    outline: none;
    font-family: inherit;
  }
  #aiInput::placeholder { color: var(--muted); }
  #aiSendBtn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--text);
    color: var(--bg);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #aiSendBtn:hover { opacity: 0.8; }
  #aiSendBtn:disabled { opacity: 0.35; cursor: default; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .ai-sidebar { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 999; width: 280px; box-shadow: 4px 0 20px rgba(0,0,0,.15); }
    .ai-sidebar.open { display: flex; }
    .ai-sidebar-toggle { display: flex; }
    .ai-sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 998; background: rgba(0,0,0,.3); }
    .ai-sidebar-overlay.open { display: block; }
    .msg-bubble { max-width: 90%; }
  }
</style>

<div class="ai-layout">
  <!-- Sidebar overlay (mobile) -->
  <div class="ai-sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="ai-sidebar" id="aiSidebar">
    <div class="ai-sb-header">
      <button onclick="newConversation()"><i class="bi bi-plus me-1"></i>Nouvelle discussion</button>
    </div>
    <div class="ai-sb-list" id="convList">
      <div class="ai-sb-empty" id="convEmpty">Aucune discussion</div>
    </div>
  </div>

  <!-- Main -->
  <div class="ai-main">
    <div class="ai-topbar">
      <button class="ai-sidebar-toggle" onclick="toggleSidebar()" title="Historique">
        <i class="bi bi-layout-sidebar-inset"></i>
      </button>
      <span class="ai-topbar-title" id="aiTitle">Nouvelle discussion</span>
      <select class="ai-model-select" id="aiModelSelect" title="Modèle IA">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gpt-4o-mini">GPT-4o Mini</option>
        <option value="gpt-4o">GPT-4o</option>
      </select>
    </div>

    <div class="ai-messages" id="aiMessages">
      <div class="ai-empty" id="aiEmpty">
        <i class="bi bi-chat-square-dots"></i>
        <p>Commencez la conversation…</p>
      </div>
    </div>

    <div class="ai-input-bar">
      <div class="ai-input-wrap">
        <textarea id="aiInput" rows="1" placeholder="Écrivez votre message…" maxlength="4000"></textarea>
      </div>
      <button id="aiSendBtn" title="Envoyer">
        <i class="bi bi-arrow-up"></i>
      </button>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
(function () {
  const STORAGE_KEY = 'fab_ai_conversations';
  const messages   = document.getElementById('aiMessages');
  const input      = document.getElementById('aiInput');
  const sendBtn    = document.getElementById('aiSendBtn');
  const emptyEl    = document.getElementById('aiEmpty');
  const convList   = document.getElementById('convList');
  const convEmpty  = document.getElementById('convEmpty');
  const titleEl    = document.getElementById('aiTitle');
  const modelSel   = document.getElementById('aiModelSelect');
  const sidebar    = document.getElementById('aiSidebar');
  const overlay    = document.getElementById('sidebarOverlay');

  let conversations = [];   // [{id, title, model, messages:[{role,text}], updated}]
  let activeId      = null;
  let busy          = false;

  // ── LocalStorage ──
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations)); } catch {}
  }
  function load() {
    try {
      conversations = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch { conversations = []; }
  }

  // ── Sidebar ──
  window.toggleSidebar = function () {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  };

  function renderSidebar() {
    if (conversations.length === 0) {
      convList.innerHTML = '<div class="ai-sb-empty">Aucune discussion</div>';
      return;
    }
    const sorted = [...conversations].sort((a, b) => (b.updated || 0) - (a.updated || 0));
    convList.innerHTML = sorted.map(c => `
      <button class="ai-conv-item ${c.id === activeId ? 'active' : ''}" onclick="loadConv('${c.id}')">
        <i class="bi bi-chat-left-text"></i>
        <span class="ai-conv-title">${esc(c.title)}</span>
        <span class="ai-conv-delete" onclick="event.stopPropagation();deleteConv('${c.id}')" title="Supprimer">
          <i class="bi bi-x-lg"></i>
        </span>
      </button>
    `).join('');
  }

  // ── Conversations ──
  window.newConversation = function () {
    activeId = null;
    titleEl.textContent = 'Nouvelle discussion';
    messages.innerHTML = '<div class="ai-empty" id="aiEmpty"><i class="bi bi-chat-square-dots"></i><p>Commencez la conversation…</p></div>';
    renderSidebar();
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    input.focus();
  };

  window.loadConv = function (id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    activeId = id;
    titleEl.textContent = conv.title;
    if (conv.model && modelSel.querySelector(`option[value="${conv.model}"]`)) {
      modelSel.value = conv.model;
    }
    messages.innerHTML = '';
    conv.messages.forEach(m => addMsg(m.role, m.role === 'user' ? esc(m.text) : md(m.text), false));
    messages.scrollTop = messages.scrollHeight;
    renderSidebar();
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    input.focus();
  };

  window.deleteConv = function (id) {
    conversations = conversations.filter(c => c.id !== id);
    save();
    if (activeId === id) newConversation();
    else renderSidebar();
  };

  function getOrCreateConv() {
    if (activeId) return conversations.find(c => c.id === activeId);
    const conv = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: 'Discussion',
      model: modelSel.value,
      messages: [],
      updated: Date.now(),
    };
    conversations.push(conv);
    activeId = conv.id;
    return conv;
  }

  // ── Messages ──
  function addMsg(role, html, animate = true) {
    document.getElementById('aiEmpty')?.remove();
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    if (!animate) row.style.animation = 'none';
    row.innerHTML = `<div>
      <div class="msg-bubble">${html}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
    messages.appendChild(row);
    if (animate) messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'typing';
    row.innerHTML = `<div class="typing-indicator">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  // ── Send ──
  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    input.value = ''; input.style.height = 'auto';

    const conv = getOrCreateConv();
    conv.model = modelSel.value;
    conv.updated = Date.now();

    // Auto-title from first message
    if (conv.messages.length === 0) {
      conv.title = text.length > 40 ? text.slice(0, 40) + '…' : text;
      titleEl.textContent = conv.title;
    }

    conv.messages.push({ role: 'user', text });
    save();
    renderSidebar();

    addMsg('user', esc(text));
    showTyping();

    try {
      const res = await fetch('/api/v1/ai/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]')?.content || '',
        },
        body: JSON.stringify({
          message: text,
          model: modelSel.value,
          history: conv.messages.slice(0, -1).slice(-30),
        }),
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (data.reply) {
        addMsg('ai', md(data.reply));
        conv.messages.push({ role: 'ai', text: data.reply });
      } else {
        const errText = data.error || 'Erreur. Réessayez.';
        addMsg('ai', esc(errText));
        conv.messages.push({ role: 'ai', text: errText });
      }
    } catch {
      document.getElementById('typing')?.remove();
      const errText = 'Impossible de contacter le serveur.';
      addMsg('ai', errText);
      conv.messages.push({ role: 'ai', text: errText });
    }

    conv.updated = Date.now();
    save();
    busy = false; sendBtn.disabled = false; input.focus();
  }

  // ── Helpers ──
  function now() {
    return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function md(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  // ── Events ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  // ── Init ──
  load();
  renderSidebar();
  input.focus();
})();
</script>
{% endblock %}
