[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fabouanes"
version = "1.3.0"
description = "FABOuanes migrated to FastAPI with preserved server-rendered UI and business workflows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn>=0.34",
  "sqlalchemy>=2.0",
  "alembic>=1.16",
  "python-multipart>=0.0.20",
  "Werkzeug>=3.0",
  "reportlab>=4.0",
  "python-dotenv>=1.0",
  "itsdangerous>=2.2",
  "openpyxl>=3.1",
  "pywebview>=5.0",
  "pg8000>=1.31",
  "gunicorn>=22.0",
  "qrcode[pil]>=8.0",
  "Pillow>=10.0",
  "slowapi>=0.1.9",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "httpx>=0.27",
  "pytest-cov>=5.0",
  "ruff>=0.5",
  "pyinstaller>=6.0",
]

[tool.pytest.ini_options]
testpaths = [
  "tests/web",
  "tests/api",
  "tests/services",
  "tests/printing",
]
python_files = ["test_*.py"]
addopts = "-q"

[tool.setuptools.packages.find]
include = ["app*"]
