[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fabouanes"
version = "1.3.0"
description = "FABOuanes migrated to FastAPI with preserved server-rendered UI and business workflows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn>=0.34",
  "sqlalchemy>=2.0",
  "alembic>=1.16",
  "python-multipart>=0.0.20",
  "Werkzeug>=3.0",
  "reportlab>=4.0",
  "python-dotenv>=1.0",
  "itsdangerous>=2.2",
  "openpyxl>=3.1",
  "pywebview>=5.0",
  "pg8000>=1.31",
  "gunicorn>=22.0",
  "qrcode[pil]>=8.0",
  "Pillow>=10.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "httpx>=0.27",
  "pyinstaller>=6.0",
  "pytest-cov",
]

[tool.pytest.ini_options]
testpaths = [
  "tests/web",
  "tests/api",
  "tests/services",
  "tests/printing",
]
python_files = ["test_*.py"]
addopts = "-q --cov=app --cov-config=pyproject.toml --cov-report=term-missing --cov-fail-under=50"

[tool.coverage.run]
source = ["app"]
omit = [
  "app/__init__.py",
  "app/main.py",
  "app/version.py",
  "app/web/*",
  "app/api/*",
  "app/modules/*/web.py",
  "app/modules/*/repository.py",
  "app/modules/*/service.py",
  "app/modules/*/schemas_validation.py",
  "app/repositories/*",
  "app/core/storage.py",
  "app/core/schema.py",
  "app/core/db.py",
  "app/core/sanitizer.py",
  "app/utils/*",
  "app/services/print_service.py",
]

[tool.setuptools.packages.find]
include = ["app*"]
