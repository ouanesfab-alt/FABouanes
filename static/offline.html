<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FABOuanes — Hors ligne</title>
  <link rel="stylesheet" href="/static/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: #f8fafc;
    }
    .offline-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .offline-icon {
      font-size: 4rem;
      color: #f59e0b;
      margin-bottom: 1.5rem;
      display: block;
    }
    h2 { font-weight: 700; font-size: 1.5rem; color: #f8fafc; }
    p { color: rgba(248,250,252,0.65); line-height: 1.7; }
    .btn-success { background: #10b981; border-color: #10b981; }
    .btn-success:hover { background: #059669; border-color: #059669; }
    .btn-outline-light:hover { background: rgba(255,255,255,0.1); }
    #pending-count {
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: #fbbf24;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <i class="bi bi-wifi-off offline-icon"></i>
    <h2>Vous êtes hors ligne</h2>
    <p>Cette page nécessite une connexion.<br>
       Vous pouvez toujours saisir des <strong>ventes</strong> et des <strong>paiements</strong>.</p>
    <div class="d-flex gap-2 justify-content-center mt-4">
      <a href="/sales/new" class="btn btn-success">
        <i class="bi bi-plus-circle me-1"></i>Nouvelle vente
      </a>
      <a href="/payments/new" class="btn btn-outline-light">
        <i class="bi bi-cash me-1"></i>Paiement
      </a>
    </div>
    <div id="pending-count" hidden></div>
  </div>
  <script type="module">
    import { countPending } from '/static/js/offline-db.js';
    countPending().then(n => {
      if (n > 0) {
        const el = document.getElementById('pending-count');
        el.textContent = `${n} opération${n > 1 ? 's' : ''} en attente de synchronisation`;
        el.hidden = false;
      }
    }).catch(() => {});
  </script>
</body>
</html>
