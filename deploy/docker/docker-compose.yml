services:
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: fabouanes_web
    restart: unless-stopped
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/fabouanes.db"
      SECRET_KEY: "${SECRET_KEY:?Definissez SECRET_KEY dans votre .env}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-0}"
      DEFAULT_ADMIN_USERNAME: "${DEFAULT_ADMIN_USERNAME:-admin}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-}"
      WEB_CONCURRENCY: "1"
    ports:
      - "${FAB_PORT:-8000}:8000"
    volumes:
      - fabdata:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  fabdata:
