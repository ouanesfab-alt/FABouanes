version: '3.8'

services:
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: fabouanes_prod_web
    restart: unless-stopped
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/fabouanes.db"
      SECRET_KEY: "${SECRET_KEY:?Definissez SECRET_KEY dans votre .env}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-1}"
      DEFAULT_ADMIN_USERNAME: "${DEFAULT_ADMIN_USERNAME:-admin}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-}"
      WEB_CONCURRENCY: "1"
      FAB_REQUEST_TIMEOUT_SECONDS: "30"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    ports:
      - "${FAB_PORT:-8000}:8000"
    volumes:
      - fabdata_prod:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: fabouanes_prod_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - web

volumes:
  prometheus_data:
