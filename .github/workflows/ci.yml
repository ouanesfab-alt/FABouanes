name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Lint with ruff
        run: ruff check app/ --select E,F,W --ignore E501
      - name: Typecheck with mypy
        run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test_fabouanes_ci.db
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      FAB_TESTING: '1'
      FASTAPI_ENV: testing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov pytest-timeout ruff
      - name: Run tests
        run: python -m pytest --cov=app --cov-fail-under=75 --timeout=30 --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
