name: FABOuanes CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check fabouanes/fastapi_compat.py fabouanes/presentation/api_validation.py fabouanes/routes/route_utils.py

      - name: Format check (black)
        run: |
          black --check fabouanes/fastapi_compat.py fabouanes/presentation/api_validation.py fabouanes/routes/route_utils.py app.py run_prod.py

      - name: Type check (mypy)
        run: |
          mypy

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Coverage report
        run: |
          coverage run -m unittest discover -s tests -v
          coverage xml
          coverage report

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
