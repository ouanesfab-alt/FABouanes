[tool.pytest.ini_options]
testpaths = [
  "tests",
]
python_files = ["test_services_coverage.py"]
addopts = "-q --cov=app --cov-config=tests/pyproject_services.toml --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["app"]
omit = [
  "app/__init__.py",
  "app/version.py",
  # Omit pure modules tested in test_coverage.py
  "app/core/exceptions.py",
  "app/core/jwt_auth.py",
  "app/core/models.py",
  "app/core/permissions.py",
  "app/core/rate_limit.py",
  "app/core/rate_limit_store.py",
  "app/core/registry.py",
  "app/core/request_state.py",
  "app/core/runtime_paths.py",
  "app/schemas/*",
  "app/modules/*",
]
